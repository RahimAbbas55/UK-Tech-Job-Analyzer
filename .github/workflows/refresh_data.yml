name: Refresh Job Data

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh job data
        env:
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
        run: python src/fetch_reed.py

      - name: Clean data
        run: python src/clean_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clean_jobs.csv
          git diff --staged --quiet || git commit -m "Auto-refresh job data"
          git push